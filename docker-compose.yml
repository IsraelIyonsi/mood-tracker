services:
  api:
    build:
      context: ./api
      dockerfile: src/MoodTracker.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Cors__AllowedOrigins__0: http://localhost:5173
    volumes:
      - mood-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    volumes:
      - ./web:/app
      - /app/node_modules

  php:
    build: ./php
    ports:
      - "8080:8080"
    volumes:
      - mood-data:/data:ro
    depends_on:
      - api

volumes:
  mood-data:
